<div class="wrap">
  <h1 class="title">Online Store</h1>

  <div class="cats">
    @for (c of categories; track c.id) {
      <button
        class="cat"
        [class.active]="c.id === selectedCategoryId"
        (click)="selectCategory(c.id)"
      >
        {{ c.name }}
      </button>
    }
  </div>

  @if (selectedCategoryId === null) {
    <p class="hint">Выбери категорию 👆</p>
  } @else {
    <app-product-list [products]="displayedProducts"></app-product-list>
  }
</div>
